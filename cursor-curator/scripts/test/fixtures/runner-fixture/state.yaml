      - "Verification command list"
    receipt: null
  - id: T002
    type: approval_gate
    assignee: Approval Gate
    status: queued
    reasoning_hint: low
    objective: "Approve a notes-only worker slice."
    inputs:
      - "T001 receipt"
    constraints:
      - "Do not implement."
    expected_output:
      - "Worker package"
    receipt: null

checks:
  dirty_fingerprint: unknown
