# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "GoalBuddy Cursor Port"
  slug: goalbuddy-cursor-port
  kind: specific
  tranche: "Cursor port of tolibear/goalbuddy — install, MCP, hub, SDK auto-loop (2.0.0); parity vs upstream 0.3.8"
  status: done
  oracle:
    signal: "Cursor operator installs from this repo, runs Goal Prep + one Scout/Judge/Worker cycle with live board and passing doctor/scripts"
    cadence: "after each Worker package and at final audit"
    final_proof: "Receipts + doctor output + sample goal board URL + README install steps exercised on this machine"
  intake:
    original_request: "https://github.com/tolibear/goalbuddy — build a repo for a cursor port of this"
    interpreted_outcome: "Ship a Cursor-native GoalBuddy port repo with working prep/board/agents loop and documented upstream parity"
    input_shape: specific
    audience: "Cursor users wanting /goal-style long runs"
    authority: requested
    proof_type: artifact
    completion_proof: "Installable repo; Goal Prep + /goal loop verified; doctor goal-ready; parity note vs upstream 0.3.x"
    likely_misfire: "Docs-only or Codex-dependent wrapper without verified Cursor install path"
    blind_spots_considered:
      - "npm publish vs vendored scripts only"
      - "full 0.3.8 parity vs MVP scope"
      - "Windows vs Unix paths for ~/.cursor"
      - "vendor upstream JS vs rewrite"
    existing_plan_facts:
      - "Upstream (ported from): https://github.com/tolibear/goalbuddy (MIT, npm goalbuddy @ 0.3.8)"
      - "This port repo: https://github.com/wstrege-kenosha/GoalBuddy-Cursor-Port (cursorPortVersion 2.0.0)"
      - "Parity matrix: docs/PARITY.md"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/goalbuddy-cursor-port/"
    command: "node ~/.cursor/skills/goalbuddy/scripts/goalbuddy.mjs board docs/goals/goalbuddy-cursor-port"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Map upstream tolibear/goalbuddy (layout, scripts, Codex/Claude install model, board hub) and this empty port repo; list verification commands and largest safe first implementation slice for Cursor."
    inputs:
      - "https://github.com/tolibear/goalbuddy"
      - "README.md (upstream)"
      - "package.json (upstream)"
      - "plugins/goalbuddy (upstream)"
      - "~/.cursor/skills/goalbuddy (local reference if present)"
      - "w:/Experimental/GoalBuddyCursorPort"
    constraints:
      - "Read-only."
      - "Do not edit implementation files outside notes/ unless PM task."
      - "Prefer concrete file-path and command evidence."
      - "Produce parity matrix: upstream feature → Cursor port status."
    expected_output:
      - "Upstream repo map"
      - "Cursor target install layout proposal"
      - "Verification commands"
      - "Ranked implementation slices"
      - "Candidate next tasks for Judge"
    receipt:
      result: done
      summary: "Mapped upstream 0.3.8 vs local Cursor v1.0.0; port repo prep-only. Recommended vendored slice #1."
      evidence:
        - notes/T001-scout.md
        - https://github.com/tolibear/goalbuddy
      note: notes/T001-scout.md
  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: default
    objective: "Review Scout findings and choose the first safe implementation slice (largest useful vertical: e.g. repo skeleton + vendored scripts + Cursor skills/commands/agents + README install)."
    inputs:
      - "T001 receipt"
      - "goal.md oracle and constraints"
    constraints:
      - "Do not implement."
      - "Pick largest safe useful slice with allowed_files, verify, stop_if."
      - "Explicitly defer out-of-scope upstream features with rationale."
    expected_output:
      - "Decision"
      - "Exact Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
    receipt:
      result: done
      decision: approved
      summary: "Approved vendored Cursor v1.0.0 + git install; deferred npm/Codex/PARITY/oracle E2E."
  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Ship git-installable Cursor GoalBuddy port v1.0.0: add root package.json, README.md, .gitignore, scripts/install-from-repo.mjs, and vendored goalbuddy/ (full local skill tree; version.json must attribute upstream goalbuddy 0.3.8) and goal-prep/ (SKILL.md). Install script copies both into ~/.cursor/skills/, then runs node <cursorHome>/skills/goalbuddy/scripts/goalbuddy.mjs install. README documents clone + one install command. Do not edit docs/goals/** or publish to npm."
    allowed_files:
      - package.json
      - README.md
      - .gitignore
      - scripts/**
      - goalbuddy/**
      - goal-prep/**
    verify:
      - npm run check
      - node --check goalbuddy/scripts/*.mjs goalbuddy/scripts/lib/*.mjs scripts/*.mjs
      - node goalbuddy/scripts/goalbuddy.mjs doctor
      - node scripts/install-from-repo.mjs
      - node goalbuddy/scripts/goalbuddy.mjs doctor --goal-ready
    stop_if:
      - "Cannot read proven source at ~/.cursor/skills/goalbuddy or goal-prep and no equivalent tree exists in repo"
      - "Install would modify paths outside ~/.cursor/skills, ~/.cursor/agents, ~/.cursor/commands, or repo allowed_files"
      - "MVP requires Codex/Claude plugin paths or npm registry publish"
      - "npm run check or doctor fails twice after a fix attempt"
      - "Needs files outside allowed_files (including docs/goals/**)"
    receipt:
      result: done
      summary: "Vendored goalbuddy+goal-prep, install script, README; npm run check and doctor --goal-ready pass."
      changed_files:
        - package.json
        - README.md
        - .gitignore
        - scripts/install-from-repo.mjs
        - scripts/check-port.mjs
        - goal-prep/SKILL.md
        - goalbuddy/
      commands:
        - cmd: npm run check
          status: pass
        - cmd: node goalbuddy/scripts/goalbuddy.mjs doctor
          status: pass
        - cmd: node scripts/install-from-repo.mjs
          status: pass
        - cmd: node goalbuddy/scripts/goalbuddy.mjs doctor --goal-ready
          status: pass
      note: notes/T003-worker.md
  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Close oracle gaps: add docs/PARITY.md from T001 matrix; root LICENSE; git init; document fresh-clone install E2E in notes/T004-worker.md; add docs/goals/sample-cursor-smoke/ scaffold and run check-goal-state + board URL receipt."
    allowed_files:
      - docs/PARITY.md
      - LICENSE
      - .gitignore
      - notes/**
      - docs/goals/sample-cursor-smoke/**
      - README.md
    verify:
      - npm run check
      - node goalbuddy/scripts/goalbuddy.mjs doctor --goal-ready
      - node goalbuddy/scripts/check-goal-state.mjs docs/goals/sample-cursor-smoke/state.yaml
    stop_if:
      - "Needs files outside allowed_files"
      - "Requires npm registry publish or Codex/Claude paths"
    receipt:
      result: done
      summary: "PARITY.md, LICENSE, git init, sample-cursor-smoke board, E2E notes; all verify pass."
      changed_files:
        - docs/PARITY.md
        - LICENSE
        - README.md
        - notes/T004-worker.md
        - docs/goals/sample-cursor-smoke/
      commands:
        - cmd: git init
          status: pass
        - cmd: npm run check
          status: pass
        - cmd: node goalbuddy/scripts/goalbuddy.mjs doctor --goal-ready
          status: pass
        - cmd: node goalbuddy/scripts/check-goal-state.mjs docs/goals/sample-cursor-smoke/state.yaml
          status: pass
        - cmd: node goalbuddy/scripts/goalbuddy.mjs board docs/goals/sample-cursor-smoke
          status: pass
        - cmd: node scripts/install-from-repo.mjs
          status: pass
      note: notes/T004-worker.md
  - id: T005
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: default
    objective: "Final audit: map T001–T004 receipts and verification to goal.md oracle; set full_outcome_complete if satisfied."
    inputs:
      - "All task receipts"
      - "notes/T004-worker.md"
      - "docs/PARITY.md"
      - "docs/goals/sample-cursor-smoke/"
    constraints:
      - "Do not implement."
      - "Map each oracle clause to evidence."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
    receipt:
      result: done
      decision: not_complete
      full_outcome_complete: false
      summary: "Install/PARITY/sample fixture met; live /goal-prep + operator S/J/W cycle still required."
  - id: T006
    type: pm
    assignee: PM
    status: done
    reasoning_hint: default
    objective: "Live operator E2E: run Goal Prep for test outcome into docs/goals/goal-prep-live-test/, then execute live Scout→Judge→Worker via Task on that board; document in docs/goals/goalbuddy-cursor-port/notes/T006-pm-e2e.md."
    allowed_files:
      - docs/goals/goal-prep-live-test/**
      - docs/goals/goalbuddy-cursor-port/notes/T006-pm-e2e.md
    verify:
      - node goalbuddy/scripts/check-goal-state.mjs docs/goals/goal-prep-live-test/state.yaml
      - node goalbuddy/scripts/goalbuddy.mjs board docs/goals/goal-prep-live-test
    receipt:
      result: done
      summary: "Live goal-prep-live-test board; Scout/Judge/Worker via Task; proof in notes/T006-pm-e2e.md and goal-prep-live-test/notes/live-cycle-proof.md."
      evidence:
        - docs/goals/goalbuddy-cursor-port/notes/T006-pm-e2e.md
        - docs/goals/goal-prep-live-test/notes/live-cycle-proof.md
      note: notes/T006-pm-e2e.md
  - id: T007
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: default
    objective: "Final oracle audit after T006 live E2E; set goal.status done if full_outcome_complete."
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      summary: "Oracle satisfied: T003–T004 install/PARITY; T006 live prep + Task S/J/W; verify pass 2026-06-04."
      evidence:
        - notes/T006-pm-e2e.md
        - docs/goals/goal-prep-live-test/notes/live-cycle-proof.md
        - docs/PARITY.md
  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: default
    objective: "Audit whether the port satisfies the goal oracle and original request."
    inputs:
      - "All done task receipts"
      - "Last verification"
      - "goal.md oracle"
    constraints:
      - "Do not implement."
      - "Reject completion if required Worker work is still queued or active."
      - "Map receipts to oracle signal explicitly."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: done
      decision: not_complete
      full_outcome_complete: false
      summary: "T003 slice passes check/doctor; oracle needs PARITY.md, clone E2E, sample goal cycle, root LICENSE, git."
      note: notes/T002-judge.md

checks:
  dirty_fingerprint: unknown
  last_verification:
    result: pass
    task: T007
    commands:
      - "npm run check"
      - "node goalbuddy/scripts/goalbuddy.mjs doctor --goal-ready"
      - "node goalbuddy/scripts/check-goal-state.mjs docs/goals/goal-prep-live-test/state.yaml"
      - "node goalbuddy/scripts/check-goal-state.mjs docs/goals/goalbuddy-cursor-port/state.yaml"
