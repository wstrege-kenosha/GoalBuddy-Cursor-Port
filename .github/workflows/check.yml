name: check

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: bun run build
        run: bun run build
      - name: install Cursor surfaces for doctor
        run: bun cursor-curator/dist/cli/curator.mjs install
      - name: bun run check
        run: bun run check
      - name: doctor --objective-ready
        run: bun cursor-curator/dist/cli/curator.mjs doctor --objective-ready
