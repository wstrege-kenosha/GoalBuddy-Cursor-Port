name: check

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: install Cursor surfaces for doctor
        run: node goalbuddy/scripts/goalbuddy.mjs install
      - name: npm run check
        run: npm run check
      - name: doctor --goal-ready
        run: node goalbuddy/scripts/goalbuddy.mjs doctor --goal-ready
